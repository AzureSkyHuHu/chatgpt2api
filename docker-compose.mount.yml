services:
  web-build:
    image: oven/bun:1.3.13
    profiles:
      - tools
    working_dir: /src/web
    command: sh -lc "bun install --frozen-lockfile --cache-dir=/root/.bun/install/cache && bun run build"
    volumes:
      - .:/src
      - bun-cache:/root/.bun/install/cache

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime-deps
      args:
        DEBIAN_MIRROR: ${DEBIAN_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian}
        DEBIAN_SECURITY_MIRROR: ${DEBIAN_SECURITY_MIRROR:-http://mirrors.tuna.tsinghua.edu.cn/debian-security}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://mirrors.aliyun.com/pypi/simple}
    image: ai2api:local
    container_name: ${APP_CONTAINER_NAME:-ai2api-local}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-18000}:80"
    volumes:
      # Runtime data/config.
      - ./data:/app/data
      - ./config.json:/app/config.json

      # Mount source code so normal code updates only need a container restart.
      - ./main.py:/app/main.py:ro
      - ./api:/app/api:ro
      - ./services:/app/services:ro
      - ./utils:/app/utils:ro
      - ./scripts:/app/scripts:ro
      - ./VERSION:/app/VERSION:ro
      - ./CHANGELOG.md:/app/CHANGELOG.md:ro

      # Frontend static export. Run `cd web && bun run build` after frontend changes.
      - ./web/out:/app/web_dist:ro
    environment:
      CHATGPT2API_AUTH_KEY: ${CHATGPT2API_AUTH_KEY:-chatgpt2api}
      CHATGPT2API_BASE_URL: ${CHATGPT2API_BASE_URL:-}
      STORAGE_BACKEND: ${STORAGE_BACKEND:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://root:123456@PostgreSQL:5432/ai2api}
      GIT_REPO_URL: ${GIT_REPO_URL:-}
      GIT_TOKEN: ${GIT_TOKEN:-}
      GIT_BRANCH: ${GIT_BRANCH:-main}
      GIT_FILE_PATH: ${GIT_FILE_PATH:-accounts.json}
    extra_hosts:
      - "host.docker.internal:host-gateway"
      - "piachi-tools.test.com:host-gateway"
    networks:
      - infra

networks:
  infra:
    external: true
    name: ${APP_DOCKER_NETWORK:-dnmp-infra}

volumes:
  bun-cache:
